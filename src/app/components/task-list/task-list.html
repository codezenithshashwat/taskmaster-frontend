<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="h4 mb-0">My Tasks</h2>
  <span class="badge bg-primary rounded-pill">{{ tasks.length }} tasks</span>
</div>

<div class="card mb-4 shadow-sm border-0 bg-light">
  <div class="card-body">
    <div class="row g-2 align-items-center">
      <div class="col-md-4">
        <input type="text" class="form-control" placeholder="Task Title" [(ngModel)]="newTaskTitle">
      </div>
      <div class="col-md-6">
        <input type="text" class="form-control" placeholder="Description (Optional)" [(ngModel)]="newTaskDescription">
      </div>
      <div class="col-md-2 d-grid">
        <button class="btn btn-primary" (click)="addTask()">Add Task</button>
      </div>
    </div>
    //for pushing
  </div>
</div>
<div class="input-group mb-4 shadow-sm border-0">
  <span class="input-group-text bg-white border-end-0 text-muted">
    <i class="bi bi-search"></i>
  </span>
  <input type="text" class="form-control border-start-0 ps-0"
         placeholder="Live search tasks by title..."
         [(ngModel)]="searchQuery"
         (input)="onSearch()">
</div>
<div class="list-group shadow-sm">
  @for (task of tasks; track task.id) {
  <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
    <div>
      <h5 class="mb-1 text-dark" [class.text-decoration-line-through]="task.completed">
        {{ task.title }}
      </h5>
      <p class="mb-1 text-muted small">{{ task.description }}</p>
      <div class="mt-2">
            <span class="badge" [class.bg-success]="task.completed" [class.bg-warning]="!task.completed">
              {{ task.completed ? 'Completed' : 'Pending' }}
            </span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-outline-success btn-sm" (click)="toggleComplete(task)">
        <i class="bi" [class.bi-check-lg]="!task.completed" [class.bi-arrow-counterclockwise]="task.completed"></i>
      </button>
      <button class="btn btn-outline-danger btn-sm" (click)="deleteTask(task.id)">
        <i class="bi bi-trash"></i>
      </button>
    </div>

  </div>
  } @empty {
  <div class="text-center p-5 border rounded bg-light">
    <i class="bi bi-clipboard-x display-4 text-muted"></i>
    <p class="mt-3">No tasks found. Time to relax!</p>
  </div>
  }
</div>
